name: Refresh Dashboard Data

on:
  schedule:
    # 7:00 AM BRT = 10:00 UTC
    - cron: "0 10 * * *"
    # 11:00 AM BRT = 14:00 UTC
    - cron: "0 14 * * *"
    # 13:00 PM BRT = 16:00 UTC
    - cron: "0 16 * * *"
    # 17:00 PM BRT = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch: # permite rodar manualmente

jobs:
  refresh-crm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch CRM data
        run: node scripts/fetch-crm.mjs

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/leads-crm/crm-cache.json
          if git diff --staged --quiet; then
            echo "No changes to crm-cache.json; triggering deploy anyway."
            curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_bGamXwDbWSLr7DSJgAI9L7fQzJCg/YUB3mzwdl7"
          else
            git commit -m "Atualizar crm-cache.json [skip ci]"
            git push
          fi
